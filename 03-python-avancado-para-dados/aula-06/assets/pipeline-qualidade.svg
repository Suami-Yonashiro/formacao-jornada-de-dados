<svg viewBox="0 100 1200 470" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>Pipeline de qualidade de código: do seu PC até o GitHub</title>
  <desc>Diagrama com três estágios — Seu PC, Git local e Git remoto — ligados por git commit e git push. Uma nota amarela indica que o pre-commit roda localmente e é opcional; uma nota rosa indica que o CI roda no GitHub Actions e é obrigatório.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" class="arrowFill"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', system-ui, Arial, sans-serif; }
    .txt { fill:#1e1e1e; }
    .txtSub { fill:#495057; }
    .boxPC{ fill:#a5d8ff; stroke:#1e1e1e; stroke-width:2; }
    .boxLocal{ fill:#b2f2bb; stroke:#1e1e1e; stroke-width:2; }
    .boxRemote{ fill:#ffd8a8; stroke:#1e1e1e; stroke-width:2; }
    .noteHook{ fill:#ffec99; stroke:#1e1e1e; stroke-width:2; }
    .noteCI{ fill:#ffc9c9; stroke:#1e1e1e; stroke-width:2; }
    .arrow{ stroke:#1e1e1e; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
    .dash{ stroke:#1e1e1e; stroke-width:1.5; stroke-dasharray:4 5; }
    .arrowFill{ fill:#1e1e1e; }
    @media (prefers-color-scheme: dark) {
      .txt{ fill:#f1f3f5; }
      .txtSub{ fill:#ced4da; }
      .arrow{ stroke:#f1f3f5; }
      .dash{ stroke:#f1f3f5; }
      .arrowFill{ fill:#f1f3f5; }
      .boxPC{ fill:#1c3a52; stroke:#f1f3f5; }
      .boxLocal{ fill:#1c3a24; stroke:#f1f3f5; }
      .boxRemote{ fill:#4a2e12; stroke:#f1f3f5; }
      .noteHook{ fill:#4a4222; stroke:#f1f3f5; }
      .noteCI{ fill:#4a1f1f; stroke:#f1f3f5; }
    }
  </style>

  <rect class="boxPC" x="40" y="160" width="280" height="150" rx="10"/>
  <text x="180" y="230" text-anchor="middle" class="txt" font-size="24">💻 Seu PC</text>
  <text x="180" y="260" text-anchor="middle" class="txtSub" font-size="17">arquivos staged</text>

  <rect class="boxLocal" x="460" y="160" width="280" height="150" rx="10"/>
  <text x="600" y="230" text-anchor="middle" class="txt" font-size="24">📁 Git local</text>
  <text x="600" y="260" text-anchor="middle" class="txtSub" font-size="17">histórico de commits</text>

  <rect class="boxRemote" x="880" y="160" width="280" height="150" rx="10"/>
  <text x="1020" y="230" text-anchor="middle" class="txt" font-size="24">☁️ Git remoto</text>
  <text x="1020" y="260" text-anchor="middle" class="txtSub" font-size="17">GitHub · branch main</text>

  <line class="arrow" x1="322" y1="235" x2="458" y2="235"/>
  <text x="390" y="220" text-anchor="middle" class="txt" font-size="18">git commit</text>

  <line class="arrow" x1="742" y1="235" x2="878" y2="235"/>
  <text x="810" y="220" text-anchor="middle" class="txt" font-size="18">git push</text>

  <line class="dash" x1="390" y1="310" x2="390" y2="350"/>
  <line class="dash" x1="810" y1="310" x2="810" y2="350"/>

  <rect class="noteHook" x="270" y="350" width="240" height="130" rx="8"/>
  <text x="390" y="382" text-anchor="middle" class="txt" font-size="19">🪝 pre-commit</text>
  <text x="390" y="408" text-anchor="middle" class="txtSub" font-size="14">black · isort · flake8</text>
  <text x="390" y="428" text-anchor="middle" class="txtSub" font-size="14">bandit · commitizen</text>
  <text x="390" y="458" text-anchor="middle" class="txtSub" font-size="13" font-style="italic">local · opcional · você decide</text>

  <rect class="noteCI" x="690" y="350" width="240" height="130" rx="8"/>
  <text x="810" y="382" text-anchor="middle" class="txt" font-size="19">🤖 CI · GitHub Actions</text>
  <text x="810" y="408" text-anchor="middle" class="txtSub" font-size="14">black --check · isort --check</text>
  <text x="810" y="428" text-anchor="middle" class="txtSub" font-size="14">flake8 · bandit</text>
  <text x="810" y="458" text-anchor="middle" class="txtSub" font-size="13" font-style="italic">remoto · obrigatório · time decide</text>

  <text x="600" y="535" text-anchor="middle" class="txt" font-size="20">pre-commit ajusta o seu código  →  CI decide se o time aceita</text>
</svg>
